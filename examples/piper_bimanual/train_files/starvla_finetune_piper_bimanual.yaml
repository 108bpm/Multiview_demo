run_id: starvla_piper_bimanual
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl]
wandb_entity: your_wandb_entity
wandb_project: starvla_piper_bimanual
is_debug: false

framework:
  name: QwenAML
  qwenvl:
    base_vlm: ./checkpoints/Qwen3-VL-4B-Instruct-Action
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
  dino:
    dino_backbone: dinov2_vits14
  action_model:
    action_model_type: DiT-B
    action_hidden_dim: 1024
    hidden_size: 1024
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 14
    state_dim: 14
    future_action_window_size: 9
    action_horizon: 10
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    use_state: true
    diffusion_model_cfg:
      cross_attention_dim: 2048
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null
  spatial_model:
    model_name_or_path: ./checkpoints/vggt
    output_dim: 2048
  spatial_projector:
    hidden_dim: 2048
    output_dim: 2560
  fuser:
    type: cross_attention
  reduce_in_full_precision: true
  use_mv_images: false
  layer_qformer:
    num_layers: 4
    num_query_tokens: 128
    input_dim: 2560
    ouptput_dim: 2560
  image_edit_model:
    model_name_or_path: ./checkpoints/LongCat-Image-Edit
    lora_path: ./checkpoints/Multi-view-VLA/LongCat-lora
    view_num: 2
    fuser_type: mlp_gated_transformer
    read_from_local: false
    num_inference_steps: 8

datasets:
  vlm_data:
    dataset_py: vlm_datasets
    dataformat: llava_json
    dataset_use: sharegpt4v_coco
    eval_dataset: sharegpt4v_coco
    data_flatten: false
    base_interval: 2
    max_pixels: 307200
    min_pixels: 784
    model_max_length: 2048
    model_type: qwen3vl
    per_device_batch_size: 4

  vla_data:
    num_workers: 4
    dataset_py: lerobot_datasets
    data_root_dir: ./datasets
    mv_data_root_dir: null
    data_mix: piper_bimanual_stack_cup_bowl
    action_type: absolute_motor
    CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
    CoT_answer: bbox
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 1
    load_all_data_for_training: true
    cache_parquet: true
    cache_episodes: true
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 4
    obs: ["top", "l_wrist", "r_wrist"]
    video_backend: torchvision_av

trainer:
  epochs: 100
  max_train_steps: 10000
  num_warmup_steps: 2000
  save_interval: 5000
  eval_interval: 5000000
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: spatial_model,image_edit_model
  loss_scale:
    vla: 1.0
    vlm: 0.0
    forcing: 0.0
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 50
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
  is_resume: false
  resume_from_checkpoint: null
  pretrained_checkpoint: ./checkpoints/Multi-view-VLA/pretrained_model/checkpoints/steps_14000_pytorch_model.pt
  reload_modules: qwen_vl_interface,action_model
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
